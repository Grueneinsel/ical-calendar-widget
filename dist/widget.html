<script>'use strict';var IcalParser=(function(){var DAY_MAP={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};function unfold(text){return text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');}
