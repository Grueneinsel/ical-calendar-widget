name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'   # stündlich ICS holen + deployen
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ICS
        env:
          CALENDAR_URL: ${{ secrets.CALENDAR_URL }}
        run: |
          if [ -n "$CALENDAR_URL" ]; then
            curl -fsSL "$CALENDAR_URL" -o dist/calendar.ics
          else
            echo "WARN: Secret CALENDAR_URL not set — skipping ICS fetch"
          fi

      - name: Build
        run: python3 bundler.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
