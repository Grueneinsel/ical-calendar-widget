name: Refresh Calendar

on:
  schedule:
    - cron: '0 * * * *'   # stündlich
  push:
    branches: [main]       # auch bei jedem Push direkt aktualisieren
  workflow_dispatch:       # manuell auslösbar

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ICS
        run: |
          curl -fsSL \
            "https://calendar.google.com/calendar/ical/c77f5869d3e32b0381ec5ecc6a7d91b0b357ffe6a9cb989fc5f25bcf3b19dec8@group.calendar.google.com/public/basic.ics" \
            -o dist/calendar.ics

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/calendar.ics
          git diff --staged --quiet || git commit -m "chore: refresh calendar.ics"
          git push
